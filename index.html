<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё портфолио</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Слайдер -->
    <section class="slider">
        <div class="slides">
            <div class="slide active"><img src="images/sl1.jpg" alt="Слайд 1"></div>
            <div class="slide"><img src="images/sl2.jpg" alt="Слайд 2"></div>
            <div class="slide"><img src="images/sl3.jpg" alt="Слайд 3"></div>
        </div>
        <button class="prev" onclick="changeSlide(-1)">‹</button>
        <button class="next" onclick="changeSlide(1)">›</button>
    </section>

    <!-- Обо мне -->
    <section class="about">
        <h2>Обо мне</h2>
        <div class="about-content">
            <div class="about-text">
                <p>Привет! Я — фотограф. Снимаю пейзажи, портреты, работаю на мероприятиях, но так же люблю креативные съёмки.</p>
            </div>
            <div class="about-skills">
                <h3>Навыки</h3>
                <ul>
                    <li>монтаж роликов</li>
                    <li>видео-съёмка</li>
                    <li>Графика</li>
                    <li>Иллюстрации</li>
                    <li>Photoshop, Primer pro</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- Галерея работ -->
    <section class="gallery">
        <h2>Мои работы</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="images/pic1.jpg" alt="Работа 1"></div>
            <div class="gallery-item"><img src="images/pic2.jpg" alt="Работа 2"></div>
            <div class="gallery-item"><img src="images/pic3.jpg" alt="Работа 3"></div>
            <div class="gallery-item"><img src="images/pic5.jpg" alt="Работа 4"></div>
            <div class="gallery-item"><img src="images/pic4.jpg" alt="Работа 5"></div>
            <div class="gallery-item"><img src="images/pic6.jpg" alt="Работа 6"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
